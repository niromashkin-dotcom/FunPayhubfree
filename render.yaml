services:
  # Hub web service
  - type: web
    name: funpayhub
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 4 --bind 0.0.0.0:$PORT funpayhub_main:app
    healthCheckPath: /health
    maxShutdownDelaySeconds: 30
    envVars:
      - key: FUNPAYHUB_HEADLESS
        value: "1"
      - key: FUNPAYHUB_API_TOKEN
        sync: false
      - key: GOLDEN_KEY
        sync: false
      - key: TELEGRAM_NOTIFIER_BOT_TOKEN
        sync: false
      - key: TELEGRAM_NOTIFIER_CHAT_ID
        sync: false

  # Telegram bot worker (aiogram 3.x)
  - type: worker
    name: funpayhub-tg-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_bot.py
    maxShutdownDelaySeconds: 30
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false
      - key: FUNPAYHUB_APP_URL
        value: "https://funpayhub.onrender.com"
      - key: FUNPAYHUB_API_TOKEN
        sync: false
      # --- AI: основной провайдер Mistral AI (приоритет) ---
      - key: LLM_API_KEY
        sync: false
      - key: LLM_API_URL
        value: "https://api.mistral.ai/v1/chat/completions"
      - key: LLM_MODEL
        value: "mistral-small-latest"
      # --- AI: резервный провайдер (freellmapi) на случай ошибок соединения ---
      - key: LLM_API_KEY_2
        sync: false
      - key: LLM_API_URL_2
        value: "http://127.0.0.1:31415/v1/chat/completions"
      - key: LLM_MODEL_2
        value: "freellm-24ba17fbc6eef0477edbfc9755b0964bbf476eba8b3469cd"
      # --- GitHub (авто-коммит патчей) ---
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: "niromashkin-dotcom/FunPayhubfree"
      - key: GITHUB_BRANCH
        value: "main"
      # --- Render (авто-деплой) ---
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_ID
        value: "srv-d98e24navr4c739cq19g"
