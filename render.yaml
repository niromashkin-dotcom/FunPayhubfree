services:
  # Hub web service
  - type: web
    name: funpayhub
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 4 --bind 0.0.0.0:$PORT funpayhub_main:app
    healthCheckPath: /health
    maxShutdownDelaySeconds: 30
    envVars:
      - key: FUNPAYHUB_HEADLESS
        value: "1"
      - key: FUNPAYHUB_API_TOKEN
        sync: false
      - key: GOLDEN_KEY
        sync: false
      - key: TELEGRAM_NOTIFIER_BOT_TOKEN
        sync: false
      - key: TELEGRAM_NOTIFIER_CHAT_ID
        sync: false

  # Telegram bot worker (aiogram 3.x)
  - type: worker
    name: funpayhub-tg-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_bot.py
    maxShutdownDelaySeconds: 30
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false
      - key: FUNPAYHUB_APP_URL
        sync: false
      - key: FUNPAYHUB_API_TOKEN
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_API_URL
        value: "http://127.0.0.1:31415/v1"
      - key: GITHUB_TOKEN
        sync: false
      - key: RENDER_API_KEY
        sync: false
