name: Keep Alive

on:
  schedule:
    # Every 10 minutes — keeps Render free tier from sleeping
    - cron: "*/10 * * * *"
  workflow_dispatch:  # manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          curl -sS -o /dev/null -w "%{http_code}" \
            "https://funpayhub.onrender.com/health" \
            --max-time 10 || echo "ping failed (expected during sleep/wake)"
